# Hekarch Wallpaper Configuration
# Time-based wallpaper switching

# Wallpaper directories (colon-separated, searched in order)
# Repo install (primary source) + User folder (for custom additions)
LIGHT_DIRS="$HOME/.config/hekarch/wallpapers/light:$HOME/.local/share/hekarch/wallpapers/light"
DARK_DIRS="$HOME/.config/hekarch/wallpapers/dark:$HOME/.local/share/hekarch/wallpapers/dark"

# Hour to switch to dark mode (24-hour format)
DARK_MODE_HOUR=18

# mpvpaper/mpv options (space-separated, no dashes)
# Default: Hardware-accelerated, 60fps smooth playback, no audio
# Customize if you have performance issues or want different behavior
MPV_OPTIONS="no-audio loop-file hwdec=auto vo=gpu profile=gpu-hq panscan=1.0 override-display-fps=60 video-sync=display-resample"
